version: "3.9"

services:
  api:
    build: ..
    container_name: lecture-rag-api
    ports:
      - "8000:8000"
    volumes:
      - rag_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

volumes:
  rag_data: